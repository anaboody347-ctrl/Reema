<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>For Reem ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff6b8a,#7a0019);color:#fff;text-align:center;overflow-x:hidden}
.card{max-width:800px;margin:40px auto;background:rgba(255,255,255,.12);padding:30px;border-radius:20px}
img{width:28%;margin:1%;border-radius:16px}
button{padding:14px 24px;border:none;border-radius:30px;font-size:18px;cursor:pointer}
.heart{position:fixed;top:-20px;animation:f 8s linear infinite}
@keyframes f{to{transform:translateY(110vh)}}
</style></head><body>
<div class="card">
<h1>إلى ريم ❤️</h1>
<p>يمكن الزعل طال... لكن حبي ليكي ما قلش لحظة.<br>
أنا آسف على أي حاجة ضايقتك، وكل اللي نفسي فيه إننا نبدأ من جديد.<br>
انتي أجمل حاجة حصلتلي، وبحبك من كل قلبي. 🌹</p>
<img src="IMG-20251216-WA0026.jpg"><img src="IMG-20260117-WA0017.jpg"><img src="IMG-20260414-WA0062.jpg">
<br><br>
<button onclick="window.open('https://www.youtube.com/results?search_query=ما+تيجي+نركن+الزعل')">🎵 ما تيجي نركن الزعل</button>
<h2>بحبك يا ريم ❤️</h2>
</div>
<script>
for(let i=0;i<40;i++){let d=document.createElement('div');d.className='heart';d.innerHTML='❤️';d.style.left=Math.random()*100+'%';d.style.animationDelay=(Math.random()*8)+'s';document.body.appendChild(d);}
</script></body></html>
